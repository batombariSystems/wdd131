<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>
<body>

<header>
    <h1>Product Review</h1>
</header>

<main>
    <form method="get" action="review.html">

        <label for="product">Product Name</label>
        <select id="product" name="product" required>
            <option value="" disabled selected>Select a Product ...</option>
        </select>

        <fieldset>
    <legend>Overall Rating</legend>

    <label>
        <input type="radio" name="rating" value="1" required>
        ☆
    </label>

    <label>
        <input type="radio" name="rating" value="2" required>
        ☆☆
    </label>

    <label>
        <input type="radio" name="rating" value="3" required>
        ☆☆☆
    </label>

    <label>
        <input type="radio" name="rating" value="4" required>
        ☆☆☆☆
    </label>

    <label>
        <input type="radio" name="rating" value="5" required>
        ☆☆☆☆☆
    </label>
</fieldset>

        <label for="installDate">Date of Installation</label>
        <input type="date" id="installDate" name="installDate" required>

        <fieldset>
            <legend>Which features did you find useful in the product?<br><em>(Check all that apply)</em></legend>

            <label>
                <input type="checkbox" id="durability" name="features" value="Durability">
                Durability
            </label>

            <label>
                <input type="checkbox" id="ease" name="features" value="Ease of Use">
                Ease of Use
            </label>

            <label>
                <input type="checkbox" id="performance" name="features" value="Performance">
                Performance
            </label>

            <label>
                <input type="checkbox" id="design" name="features" value="Design">
                Design
            </label>
        </fieldset>

        <label for="review">
            Written Review <span>(Optional)</span>
        </label>
        <textarea id="review" name="review" rows="6"></textarea>

        <label for="username">
            Your Name <span>(Optional)</span>
        </label>
        <input type="text" id="username" name="username">

        <input type="submit" value="Post Review">

    </form>
</main>

<footer>
    <p>&copy; <span id="currentyear"></span> 🌺 Batombari Nyienakuna 🌺 Madagascar</p>
    <p>Last Modification: <span id="lastModified"></span></p>
</footer>

<script>
document.querySelector("#currentyear").textContent = new Date().getFullYear();
document.querySelector("#lastModified").textContent = document.lastModified;
</script>

</body>
</html>
